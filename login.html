<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה · משפחת חוגג</title>
  <link rel="icon" type="image/png" href="assets/logo-mark.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Assistant:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Assistant', sans-serif;
      background: linear-gradient(135deg, #FAF6F0 0%, #E8DED0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      margin-bottom: 24px;
    }
    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
    }
    h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 36px;
    }
    .input-group {
      margin-bottom: 24px;
      text-align: right;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Assistant', sans-serif;
      transition: all 0.2s;
      text-align: center;
      letter-spacing: 2px;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #8B7355;
      box-shadow: 0 0 0 4px rgba(139, 115, 85, 0.1);
    }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8B7355 0%, #6B5645 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Assistant', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 115, 85, 0.3);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      border-right: 3px solid #dc2626;
    }
    .error.show {
      display: block;
    }
    .footer-note {
      margin-top: 32px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="assets/logo-mark.png" alt="משפחת חוגג" />
    </div>
    <h1>משפחת חוגג</h1>
    <p class="subtitle">אתר פרטי למשפחה בלבד</p>
    
    <form id="loginForm">
      <div class="input-group">
        <label for="password">קוד כניסה</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••" 
          autocomplete="off"
          required
        />
      </div>
      <button type="submit">כניסה לאתר</button>
      <div class="error" id="error">
        קוד שגוי. אנא נסה שוב.
      </div>
    </form>
    
    <p class="footer-note">
      הסיסמה נשמרת במכשיר למשך שבוע
    </p>
  </div>

  <script>
    // הסיסמה מוצפנת ב-SHA-256
    // סיסמה: Ohsjnl26
    const CORRECT_HASH = '525920eb75f6453733fa289a0a49d13e72e82a1d52e5fa62866034a3521d6d6a';
    const REMEMBER_DAYS = 7;

    async function hashPassword(password) {
      const msgBuffer = new TextEncoder().encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const hash = await hashPassword(password);
      
      if (hash === CORRECT_HASH) {
        // נכון! שמירה ב-localStorage
        const expiry = Date.now() + (REMEMBER_DAYS * 24 * 60 * 60 * 1000);
        localStorage.setItem('hogeg_auth', JSON.stringify({ hash, expiry }));
        window.location.href = 'index.html';
      } else {
        // שגוי
        document.getElementById('error').classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        setTimeout(() => {
          document.getElementById('error').classList.remove('show');
        }, 3000);
      }
    });

    // בדיקה אם כבר מחובר
    const stored = localStorage.getItem('hogeg_auth');
    if (stored) {
      try {
        const { hash, expiry } = JSON.parse(stored);
        if (Date.now() < expiry && hash === CORRECT_HASH) {
          window.location.href = 'index.html';
        } else {
          localStorage.removeItem('hogeg_auth');
        }
      } catch (e) {
        localStorage.removeItem('hogeg_auth');
      }
    }
  </script>
</body>
</html>
